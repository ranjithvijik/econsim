version: 1
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'SAMEORIGIN'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
  # HTML must not be served from stale caches (private + no-store avoids shared CDN/browser keeping old builds)
  - pattern: '**/*.html'
    headers:
      - key: 'Cache-Control'
        value: 'private, no-store, no-cache, must-revalidate, max-age=0'
      - key: 'Pragma'
        value: 'no-cache'
frontend:
  phases:
    preBuild:
      commands:
        - echo "Injecting API keys..."
        - sed -i "s/__AV_API_KEY__/${AV_API_KEY}/g" index.html
        - sed -i "s/__FRED_API_KEY__/${FRED_API}/g" index.html
        - echo "Verifying injection..."
        - if grep -q "__AV_API_KEY__" index.html || grep -q "__FRED_API_KEY__" index.html; then echo "WARNING - placeholders not fully replaced, check environment variables"; else echo "Success - API keys injected"; fi
    build:
      commands:
        # Amplify serves /econsimguide/ from econsimguide/index.html (clean URL); without this, /econsimguide/ 404s
        - mkdir -p econsimguide
        - cp econsimguide.html econsimguide/index.html
        - echo "Build complete"
  artifacts:
    baseDirectory: /
    files:
      - index.html
      - econsimguide.html
      - econsimguide/index.html
  cache:
    paths: []
